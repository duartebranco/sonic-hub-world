<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sonic Hub World</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div id="title-screen">
            <div class="ts-logo">
                <span class="ts-logo-sonic">Sonic</span>
                <span class="ts-logo-sub">Hub World</span>
            </div>
            <div class="ts-press" id="ts-press">Press Enter</div>
            <div class="ts-copyright">© 2026 &nbsp;·&nbsp; ICG Project</div>
        </div>

        <div id="canvas-container"></div>

        <div id="hud">
            <div id="ring-counter">RINGS : <span id="ring-count">0</span></div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module" src="js/main.js"></script>
    </body>
</html>
