// ── LOAD TEXTURE FROM DATA URI ───────────────────────────────────────────────
function dataTex(key, repeat=[1,1], wrapS=true) {
    const tex = new THREE.TextureLoader().load(ASSETS[key]);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    if (wrapS) {
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.ClampToEdgeWrapping;
        tex.repeat.set(...repeat);
    }
    return tex;
}

// ── RENDERER ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(1);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
const cvs = renderer.domElement;
cvs.style.cssText = 'width:100vw;height:100vh;image-rendering:pixelated';
document.body.appendChild(cvs);

// ── SCENE ───────────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x2424cc);  // GHZ sky blue

const camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 14);

scene.add(new THREE.AmbientLight(0xffffff, 1.4));

// ── LAYER BUILDER ──────────────────────────────────────────────────────────
// Each layer is a flat plane at depth z, textured with one sprite sheet.
// worldH controls the apparent height. aspect = tex width/height → worldW.
// Tiling: how many times the texture repeats horizontally (for wide bands).
function makeLayer(key, z, worldH, tileX=1, alpha=false, offsetY=0) {
    const tex = dataTex(key, [tileX, 1], true);
    const img = new Image();
    img.src = ASSETS[key];

    // We'll set geometry after image loads to get correct aspect
    const geo  = new THREE.PlaneGeometry(1,1);
    const mat  = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: alpha,
        alphaTest: alpha ? 0.1 : 0,
        side: THREE.DoubleSide,
        depthWrite: !alpha,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(0, offsetY, z);

    img.onload = () => {
        const worldW = worldH * (img.naturalWidth / img.naturalHeight) * tileX;
        mesh.geometry.dispose();
        mesh.geometry = new THREE.PlaneGeometry(worldW, worldH);
    };
    scene.add(mesh);
    return mesh;
}

// ── BUILD SCENE ─────────────────────────────────────────────────────────────
// Sky is just scene.background (solid deep blue)

// Clouds — top of scene, tiled 3x across for coverage
makeLayer('bg_clouds', -18, 2.5, 4,  false,  3.5);

// Spiky cliffs — mid-distance
makeLayer('bg_cliffs', -12, 3.5, 3,  false,  1.2);

// Green bushes + purple hills strip
makeLayer('bg_bushes', -8,  3.2, 2,  false, -0.2);

// Water — spans the "pond" area, animated in shader (we scroll the UV)
const waterTex = dataTex('bg_water', [2, 1]);
const waterMat = new THREE.MeshBasicMaterial({
    map: waterTex,
    transparent: false,
    side: THREE.DoubleSide,
});
const waterH = 3.8;
const waterMesh = new THREE.Mesh(new THREE.PlaneGeometry(24, waterH), waterMat);
waterMesh.position.set(0, -1.2, -4);
scene.add(waterMesh);

// Foreground tile strip (palms, grass, checkerboard ground) with transparency
makeLayer('fg_foreground', -1, 8,  1.5, true, -1.5);

// ── FLOWERS ─────────────────────────────────────────────────────────────────
// Sunflowers: 4 frames cycling
const sunFrames = ['fs_sunA','fs_sunB','fs_sunC','fs_sunD'].map(k => dataTex(k,[1,1],false));
// Purple flowers: 3 frames
const purFrames = ['fs_purA','fs_purB','fs_purC'].map(k => dataTex(k,[1,1],false));
// Tulips: 3 frames
const tulFrames = ['fs_tulA','fs_tulB','fs_tulC'].map(k => dataTex(k,[1,1],false));

function makeFlower(frames, x, y, z, h) {
    const mat = new THREE.MeshBasicMaterial({
        map: frames[0], transparent: true, alphaTest: 0.1,
        side: THREE.DoubleSide, depthWrite: false,
    });
    // Load first image to get aspect
    const img = new Image();
    img.src = ASSETS[Object.keys(ASSETS).find(k => ASSETS[k] === frames[0].image?.src) || 'fs_sunA'];
    const geo = new THREE.PlaneGeometry(h*0.8, h);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    return { mesh, mat, frames, frame: 0, timer: 0 };
}

const flowers = [
    makeFlower(sunFrames, -4.5, -2.2, 1.5, 2.0),
    makeFlower(sunFrames,  4.8, -2.2, 1.5, 2.0),
    makeFlower(purFrames, -0.5, -2.5, 2.0, 1.8),
    makeFlower(purFrames,  2.2, -2.5, 2.0, 1.6),
    makeFlower(tulFrames, -2.8, -2.4, 1.8, 1.7),
];

// ── SONIC ───────────────────────────────────────────────────────────────────
const sonicTex = dataTex('sonic', [1,1], false);
const sonicMat = new THREE.MeshBasicMaterial({
    map: sonicTex, transparent: true, alphaTest: 0.1,
    side: THREE.DoubleSide, depthWrite: false,
});
const sonicMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 1.8), sonicMat);
sonicMesh.position.set(-1.2, -2.2, 2.5);
scene.add(sonicMesh);

// ── MOUSE PARALLAX ──────────────────────────────────────────────────────────
let mx = 0, my = 0;
window.addEventListener('mousemove', e => {
    mx = (e.clientX/window.innerWidth  - 0.5) * 2;
    my = (e.clientY/window.innerHeight - 0.5) * 2;
});

// ── ANIMATION LOOP ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let orbit = 0, flowerTimer = 0, waterOff = 0;
const FLOWER_FPS = 0.18;  // seconds per flower frame

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    orbit += dt * 0.12;
    flowerTimer += dt;
    waterOff += dt * 0.3;  // water scroll speed

    // Water UV scroll (animate the water texture)
    waterTex.offset.x = waterOff * 0.05;
    waterTex.offset.y = Math.sin(waterOff * 0.8) * 0.02;
    waterTex.needsUpdate = true;

    // Flower animation
    if (flowerTimer > FLOWER_FPS) {
        flowerTimer = 0;
        flowers.forEach(f => {
            f.frame = (f.frame + 1) % f.frames.length;
            f.mat.map = f.frames[f.frame];
            f.mat.needsUpdate = true;
        });
    }

    // Camera parallax — gentle drift + mouse tilt
    const tx = mx * 1.8 + Math.sin(orbit) * 0.6;
    const ty = my * -0.9 + Math.cos(orbit * 0.65) * 0.25;
    camera.position.x += (tx - camera.position.x) * 0.035;
    camera.position.y += (ty - camera.position.y) * 0.035;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
