name: Format

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    prettier:
        name: Prettier
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Check formatting
              run: npm run format:check
