name: Code Quality

on:
    push:
        branches: ["master"]
    pull_request:

permissions:
    contents: read

jobs:
    lint-and-format:
        name: Lint & Format Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Run ESLint
              run: npm run lint

            - name: Check Prettier formatting
              run: npm run format:check
