<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sonic Jump Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: white; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; }
        button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button.active { background: #f44336; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Sonic Jump Debugger</h3>
        <input type="file" id="file-input" accept=".glb,.gltf">
        <button id="jump-btn">ATIVAR SALTO</button>
        <p style="font-size: 11px; color: #aaa;">Abra o Console (F12) para ver a lista de ossos.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, controls, currentModel;
        let isJumping = false;
        const clock = new THREE.Clock();

        // Mapeamento simplificado para busca
        const boneMap = {
            neck: "23", shoulderR: "29", elbowR: "28", pulseR: "27",
            shoulderL: "38", elbowL: "37", pulseL: "36",
            hipL: "44", kneeL: "43", hipR: "50", kneeR: "49"
        };

        let foundBones = {};

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(2, 5, 5);
            scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

            controls = new OrbitControls(camera, renderer.domElement);

            document.getElementById('file-input').addEventListener('change', loadFile);
            document.getElementById('jump-btn').addEventListener('click', (e) => {
                isJumping = !isJumping;
                e.target.innerText = isJumping ? "PARAR ANIMAÇÃO" : "ATIVAR SALTO";
                e.target.className = isJumping ? "active" : "";
            });

            animate();
        }

        function loadFile(event) {
            const file = event.target.files[0];
            const url = URL.createObjectURL(file);
            const loader = new GLTFLoader();

            if (currentModel) scene.remove(currentModel);
            foundBones = {};

            loader.load(url, (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);

                console.log("--- LISTA DE OSSOS DETECTADOS ---");
                currentModel.traverse(n => {
                    if (n.isBone) {
                        console.log(`Nome: ${n.name}`);
                        n.userData.initRot = n.rotation.clone();

                        // Busca o osso correspondente na sua lista pelo final do nome
                        for (let key in boneMap) {
                            if (n.name.endsWith(boneMap[key])) {
                                foundBones[key] = n;
                                console.log(`=> Mapeado como: ${key}`);
                            }
                        }
                    }
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isJumping && currentModel) {
                const t = clock.getElapsedTime() * 6;
                const wave = Math.sin(t); // Vai de -1 a 1
                const tuck = (wave + 1) / 2; // Vai de 0 a 1

                // Aplica rotação nos ossos encontrados
                if (foundBones.hipL) foundBones.hipL.rotation.x = foundBones.hipL.userData.initRot.x - (tuck * 1.5);
                if (foundBones.hipR) foundBones.hipR.rotation.x = foundBones.hipR.userData.initRot.x - (tuck * 1.5);
                if (foundBones.kneeL) foundBones.kneeL.rotation.x = foundBones.kneeL.userData.initRot.x + (tuck * 2);
                if (foundBones.kneeR) foundBones.kneeR.rotation.x = foundBones.kneeR.userData.initRot.x + (tuck * 2);
                if (foundBones.shoulderL) foundBones.shoulderL.rotation.z = foundBones.shoulderL.userData.initRot.z + (tuck * 1);
                if (foundBones.shoulderR) foundBones.shoulderR.rotation.z = foundBones.shoulderR.userData.initRot.z - (tuck * 1);

                // Faz o modelo inteiro subir e descer no espaço
                currentModel.position.y = tuck * 1.2;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
