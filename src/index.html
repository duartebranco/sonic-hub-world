<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sonic Hub World</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
        <style>
            .ts-controls {
                margin-top: 2rem;
                color: #ffffff;
                font-size: 0.7rem;
                text-align: center;
                line-height: 2;
                letter-spacing: 1px;
                text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.5);
            }
        </style>
    </head>
    <body>
        <div id="title-screen">
            <div class="ts-logo">
                <span class="ts-logo-sonic">Sonic</span>
                <span class="ts-logo-sub">Hub World</span>
            </div>
            <div class="ts-press" id="ts-press" style="font-size: clamp(0.8rem, 2vw, 1.2rem)">
                Click or Press Enter
            </div>
            <div class="ts-controls">
                WASD / Arrows : Move<br />
                Space : Jump<br />
                Shift / X : Spin Dash<br />
                Mouse : Look Around<br />
                M : Mute / Unmute
            </div>
            <div class="ts-copyright">© 2026 &nbsp;·&nbsp; ICG Project</div>
        </div>

        <div id="game-over-screen">
            <div class="go-title">Game Over</div>
            <div class="ts-press">Press Enter to start again</div>
        </div>

        <div id="canvas-container"></div>

        <div id="speed-lines"></div>

        <div id="underwater-overlay"></div>
        <div id="drown-timer"></div>

        <div id="challenge-hint" class="hidden">
            <div class="ch-text">Collect all 50 rings!</div>
            <div class="ch-sub">As fast as you can</div>
        </div>

        <div id="challenge-complete" class="hidden">
            <div class="cc-title">Complete!</div>
            <div class="cc-time" id="cc-time"></div>
            <div class="cc-record hidden" id="cc-record">New Record!</div>
            <div class="cc-best" id="cc-best"></div>
        </div>

        <div id="rotate-overlay">
            <div class="rotate-icon">&#8635;</div>
            <div class="rotate-text">Rotate your device</div>
        </div>

        <div id="mobile-controls">
            <div id="joy-zone">
                <div id="joy-base"></div>
                <div id="joy-knob"></div>
            </div>
            <div id="mobile-btns">
                <button id="btn-spin" type="button">SPIN</button>
                <button id="btn-jump" type="button">JUMP</button>
            </div>
        </div>

        <div id="hud">
            <button id="audio-toggle" type="button" aria-pressed="false">Sound: On (M)</button>
            <div id="ring-counter-container">
                <div class="ring-counter-cap left"></div>
                <div id="ring-counter">
                    <div class="ring-counter-label">RINGS :</div>
                    <div id="ring-count">0</div>
                </div>
                <div class="ring-counter-cap right"></div>
            </div>
            <div id="time-counter-container">
                <div class="ring-counter-cap left"></div>
                <div id="time-counter" class="counter-box">
                    <div class="ring-counter-label">TIME :</div>
                    <div id="time-count">0:00.00</div>
                </div>
                <div class="ring-counter-cap right"></div>
            </div>
            <div id="spin-charge-bar" class="hidden">
                <div id="spin-charge-fill"></div>
            </div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module" src="js/main.js"></script>
    </body>
</html>
