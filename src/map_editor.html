<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Map Editor</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap");

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0a0a0f;
                --panel: #12121a;
                --panel2: #181824;
                --border: #2a2a3e;
                --accent: #00e5ff;
                --accent2: #ff4081;
                --accent3: #69ff47;
                --accent4: #ffb74d;
                --text: #e0e0f0;
                --muted: #666688;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "Space Mono", monospace;
                display: flex;
                height: 100vh;
                overflow: hidden;
            }

            /* 3D VIEWPORT */
            #viewport {
                flex: 1;
                position: relative;
                border-right: 1px solid var(--border);
                min-width: 0;
            }
            #viewport canvas {
                display: block;
            }

            #viewport-label {
                position: absolute;
                top: 16px;
                left: 16px;
                font-family: "Syne", sans-serif;
                font-weight: 800;
                font-size: 11px;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: var(--accent);
                opacity: 0.8;
                pointer-events: none;
            }

            #info {
                position: absolute;
                bottom: 16px;
                left: 16px;
                background: rgba(0, 0, 0, 0.65);
                border: 1px solid var(--border);
                border-left: 3px solid var(--accent);
                padding: 10px 14px;
                font-size: 11px;
                line-height: 1.7;
                min-width: 220px;
                backdrop-filter: blur(4px);
                pointer-events: none;
            }
            #info .title {
                color: var(--accent);
                font-weight: bold;
                font-size: 13px;
            }
            #info .hint {
                color: var(--muted);
                margin-top: 4px;
            }

            #compass {
                position: absolute;
                top: 16px;
                right: 16px;
                width: 64px;
                height: 64px;
                border: 1px solid var(--border);
                border-radius: 50%;
                background: rgba(0, 0, 0, 0.55);
                color: var(--muted);
                font-size: 10px;
                font-weight: bold;
                pointer-events: none;
            }
            #compass .dir {
                position: absolute;
                width: 100%;
                text-align: center;
                left: 0;
            }
            #compass .n {
                top: 4px;
                color: var(--accent);
            }
            #compass .s {
                bottom: 4px;
            }
            #compass .e {
                right: 4px;
                top: 50%;
                transform: translateY(-50%);
                text-align: right;
                padding-right: 6px;
            }
            #compass .w {
                left: 4px;
                top: 50%;
                transform: translateY(-50%);
                text-align: left;
                padding-left: 6px;
            }

            #mode-toggle {
                position: absolute;
                bottom: 16px;
                right: 16px;
                display: flex;
                gap: 4px;
                background: rgba(0, 0, 0, 0.65);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 4px;
                backdrop-filter: blur(4px);
            }
            #mode-toggle button {
                background: transparent;
                color: var(--muted);
                border: none;
                padding: 6px 12px;
                font-family: "Space Mono", monospace;
                font-size: 10px;
                font-weight: bold;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                cursor: pointer;
                border-radius: 3px;
                transition: all 0.15s;
            }
            #mode-toggle button:hover {
                color: var(--text);
            }
            #mode-toggle button.active {
                background: var(--accent);
                color: var(--bg);
            }

            /* RIGHT PANEL */
            #panel {
                width: 360px;
                display: flex;
                flex-direction: column;
                background: var(--panel);
                overflow: hidden;
            }

            #panel-scroll {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
            }
            #panel-scroll::-webkit-scrollbar {
                width: 4px;
            }
            #panel-scroll::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }

            .section {
                padding: 14px 16px;
                border-bottom: 1px solid var(--border);
            }

            .section-title {
                font-family: "Syne", sans-serif;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 10px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .section-title .count {
                color: var(--muted);
                font-size: 9px;
                opacity: 0.7;
            }

            /* File drop */
            #file-drop {
                border: 1.5px dashed var(--border);
                border-radius: 6px;
                padding: 12px;
                text-align: center;
                cursor: pointer;
                transition: all 0.2s;
                font-size: 11px;
                color: var(--muted);
                margin-bottom: 8px;
            }
            #file-drop:hover,
            #file-drop.drag-over {
                border-color: var(--accent);
                background: rgba(0, 229, 255, 0.05);
                color: var(--accent);
            }
            #file-drop input {
                display: none;
            }

            /* Buttons */
            .btn-row {
                display: flex;
                gap: 6px;
            }
            .btn {
                flex: 1;
                padding: 8px 4px;
                border: 1px solid var(--border);
                background: transparent;
                color: var(--text);
                font-family: "Space Mono", monospace;
                font-size: 10px;
                font-weight: bold;
                letter-spacing: 1px;
                cursor: pointer;
                border-radius: 4px;
                transition: all 0.15s;
                text-transform: uppercase;
            }
            .btn:hover {
                background: rgba(255, 255, 255, 0.06);
                border-color: var(--text);
            }
            .btn.primary {
                border-color: var(--accent);
                color: var(--accent);
            }
            .btn.primary:hover {
                background: rgba(0, 229, 255, 0.12);
            }
            .btn.danger {
                border-color: var(--accent2);
                color: var(--accent2);
            }
            .btn.danger:hover {
                background: rgba(255, 64, 129, 0.12);
            }
            .btn.success {
                border-color: var(--accent3);
                color: var(--accent3);
            }
            .btn.success:hover {
                background: rgba(105, 255, 71, 0.12);
            }
            .btn.warn {
                border-color: var(--accent4);
                color: var(--accent4);
            }
            .btn.warn:hover {
                background: rgba(255, 183, 77, 0.12);
            }
            .btn:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }

            /* Object groups */
            .group {
                margin-bottom: 8px;
            }
            .group-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 8px 10px;
                background: var(--panel2);
                border-radius: 4px;
                cursor: pointer;
                user-select: none;
                transition: background 0.15s;
            }
            .group-header:hover {
                background: rgba(255, 255, 255, 0.04);
            }
            .group-header .gh-left {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 11px;
                font-weight: bold;
                letter-spacing: 1px;
                text-transform: uppercase;
            }
            .group-header .gh-dot {
                width: 10px;
                height: 10px;
                border-radius: 2px;
                flex-shrink: 0;
            }
            .group-header .gh-count {
                font-size: 9px;
                color: var(--muted);
                font-weight: normal;
            }
            .group-header .gh-add {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--muted);
                font-size: 11px;
                font-weight: bold;
                width: 20px;
                height: 20px;
                border-radius: 3px;
                cursor: pointer;
                line-height: 1;
                transition: all 0.15s;
            }
            .group-header .gh-add:hover {
                color: var(--accent3);
                border-color: var(--accent3);
            }
            .group-items {
                margin-top: 4px;
                padding-left: 8px;
            }
            .group.collapsed .group-items {
                display: none;
            }

            .obj-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 10px;
                font-size: 11px;
                cursor: pointer;
                border-left: 2px solid transparent;
                transition: background 0.15s;
                border-radius: 0 3px 3px 0;
            }
            .obj-item:hover {
                background: rgba(255, 255, 255, 0.03);
            }
            .obj-item.selected {
                background: rgba(0, 229, 255, 0.08);
                border-left-color: var(--accent);
                color: var(--accent);
            }
            .obj-item .obj-name {
                flex: 1;
                font-size: 10px;
                color: var(--muted);
            }
            .obj-item.selected .obj-name {
                color: var(--accent);
            }
            .obj-item .obj-del {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                font-size: 12px;
                padding: 2px 4px;
                border-radius: 3px;
                line-height: 1;
            }
            .obj-item .obj-del:hover {
                color: var(--accent2);
                background: rgba(255, 64, 129, 0.12);
            }

            /* Field rows */
            .field {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 8px;
            }
            .field label {
                width: 70px;
                font-size: 10px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 1px;
                flex-shrink: 0;
            }
            .field input[type="number"],
            .field input[type="text"],
            .field select {
                flex: 1;
                background: var(--panel2);
                border: 1px solid var(--border);
                color: var(--text);
                padding: 6px 8px;
                font-family: "Space Mono", monospace;
                font-size: 11px;
                border-radius: 3px;
                outline: none;
                min-width: 0;
            }
            .field input:focus,
            .field select:focus {
                border-color: var(--accent);
            }
            .field .val-range {
                flex: 2;
            }
            .field .val-num {
                width: 56px;
                flex: 0 0 56px;
                text-align: right;
            }

            input[type="range"] {
                flex: 1;
                -webkit-appearance: none;
                height: 3px;
                border-radius: 2px;
                background: var(--border);
                outline: none;
                cursor: pointer;
                accent-color: var(--accent);
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: var(--accent);
                cursor: pointer;
            }

            /* Inspector */
            #inspector {
                padding: 14px 16px;
                background: var(--panel2);
                border-top: 1px solid var(--border);
            }
            #inspector .ins-title {
                font-family: "Syne", sans-serif;
                font-size: 12px;
                font-weight: 800;
                letter-spacing: 2px;
                text-transform: uppercase;
                margin-bottom: 12px;
                color: var(--accent);
            }
            #inspector.empty {
                color: var(--muted);
                font-size: 11px;
                text-align: center;
                padding: 24px 16px;
                font-style: italic;
            }

            .toast {
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 10px 18px;
                background: rgba(0, 0, 0, 0.9);
                border: 1px solid var(--accent3);
                color: var(--accent3);
                font-size: 11px;
                letter-spacing: 1px;
                text-transform: uppercase;
                border-radius: 4px;
                z-index: 1000;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.2s;
            }
            .toast.show {
                opacity: 1;
            }
            .toast.err {
                border-color: var(--accent2);
                color: var(--accent2);
            }
        </style>
    </head>
    <body>
        <div id="viewport">
            <div id="viewport-label">
                Map Editor — Left-drag: select/move · Right-drag: orbit · Scroll: zoom
            </div>
            <div id="info">
                <div class="title" id="info-title">Nothing selected</div>
                <div class="hint" id="info-hint">Click an object in the scene or list</div>
            </div>
            <div id="compass">
                <div class="dir n">N</div>
                <div class="dir s">S</div>
                <div class="dir e">E</div>
                <div class="dir w">W</div>
            </div>
            <div id="mode-toggle">
                <button id="mode-top" class="active">Top</button>
                <button id="mode-persp">3D</button>
            </div>
        </div>

        <div id="panel">
            <div id="panel-scroll">
                <!-- FILE I/O -->
                <div class="section">
                    <div class="section-title">Map File</div>
                    <div id="file-drop">
                        <input type="file" id="file-input" accept=".js,.json" />
                        <div id="drop-label">
                            Drop <b>map_design.js</b> or .json here<br />
                            <span style="opacity: 0.6">or click to browse</span>
                        </div>
                    </div>
                    <div class="btn-row" style="margin-bottom: 6px">
                        <button class="btn primary" id="reload-btn">Reload From Disk</button>
                    </div>
                    <div class="btn-row">
                        <button class="btn success" id="download-js-btn">Download .js</button>
                        <button class="btn" id="download-json-btn">Download JSON</button>
                        <button class="btn" id="copy-btn">Copy</button>
                    </div>
                </div>

                <!-- WORLD GLOBALS -->
                <div class="section">
                    <div class="section-title">World</div>
                    <div class="field">
                        <label>World R</label>
                        <input
                            type="range"
                            class="val-range"
                            id="g-worldR"
                            min="40"
                            max="200"
                            step="1"
                        />
                        <input type="number" class="val-num" id="g-worldR-num" step="1" />
                    </div>
                </div>

                <!-- OBJECT GROUPS -->
                <div class="section">
                    <div class="section-title">
                        Objects
                        <span class="count" id="total-count">0</span>
                    </div>
                    <div style="font-size:9px;color:var(--muted);margin-bottom:10px;letter-spacing:0.5px;">
                        Priority: <span style="color:var(--text)">World R</span> &gt; <span style="color:#69ff47">Plateaus</span> &gt; Ramps &gt; <span style="color:#ff4081">Lakes / Trenches</span>
                    </div>
                    <div id="groups"></div>
                </div>
            </div>

            <div id="inspector" class="empty">Select an object to edit</div>
        </div>

        <div class="toast" id="toast"></div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";

            // ─── Type schemas ─────────────────────────────────────────────────────────────
            // Each type declares its editable fields and the default shape for new items.
            const TYPES = {
                plateaus: {
                    label: "Plateaus",
                    color: 0x69ff47,
                    defaults: { x: 0, z: 0, radius: 12, height: 5 },
                    fields: [
                        { key: "x", min: -120, max: 120, step: 0.5 },
                        { key: "z", min: -120, max: 120, step: 0.5 },
                        { key: "radius", min: 1, max: 60, step: 0.5 },
                        { key: "height", min: 0.5, max: 40, step: 0.5 },
                    ],
                },
                ramps: {
                    label: "Ramps",
                    color: 0xffb74d,
                    defaults: { x: 0, z: 0, width: 20, length: 40, height: 4, facing: "north" },
                    fields: [
                        { key: "x", min: -120, max: 120, step: 0.5 },
                        { key: "z", min: -120, max: 120, step: 0.5 },
                        { key: "width", min: 2, max: 80, step: 0.5 },
                        { key: "length", min: 2, max: 100, step: 0.5 },
                        { key: "height", min: 0.5, max: 20, step: 0.5 },
                        {
                            key: "facing",
                            type: "select",
                            options: ["north", "south", "east", "west"],
                        },
                    ],
                },
                lakes: {
                    label: "Lakes",
                    color: 0x448aff,
                    defaults: { x: 0, z: 0, radius: 20, depth: 4 },
                    fields: [
                        { key: "x", min: -120, max: 120, step: 0.5 },
                        { key: "z", min: -120, max: 120, step: 0.5 },
                        { key: "radius", min: 2, max: 80, step: 0.5 },
                        { key: "depth", min: 0.5, max: 20, step: 0.5 },
                    ],
                },
                trenches: {
                    label: "Trenches",
                    color: 0xff4081,
                    defaults: { x: 0, z: 0, width: 15, length: 25, depth: 4 },
                    fields: [
                        { key: "x", min: -120, max: 120, step: 0.5 },
                        { key: "z", min: -120, max: 120, step: 0.5 },
                        { key: "width", min: 2, max: 80, step: 0.5 },
                        { key: "length", min: 2, max: 100, step: 0.5 },
                        { key: "depth", min: 0.5, max: 20, step: 0.5 },
                    ],
                },
                waterPlanes: {
                    label: "Water Planes",
                    color: 0x1ca3ec,
                    defaults: { x: 0, y: -2.5, z: 0, width: 60, length: 60 },
                    fields: [
                        { key: "x", min: -150, max: 150, step: 0.5 },
                        { key: "z", min: -150, max: 150, step: 0.5 },
                        { key: "y", min: -20, max: 10, step: 0.1 },
                        { key: "width", min: 2, max: 200, step: 1 },
                        { key: "length", min: 2, max: 200, step: 1 },
                    ],
                },
                bridges: {
                    label: "Bridges",
                    color: 0x8b5a2b,
                    defaults: { x: 0, y: -0.5, z: 0, length: 24, width: 6, spanAxis: "x" },
                    fields: [
                        { key: "x", min: -120, max: 120, step: 0.5 },
                        { key: "z", min: -120, max: 120, step: 0.5 },
                        { key: "y", min: -10, max: 20, step: 0.1 },
                        { key: "length", min: 2, max: 80, step: 0.5 },
                        { key: "width", min: 1, max: 20, step: 0.5 },
                        { key: "spanAxis", type: "select", options: ["x", "z"] },
                    ],
                },
                mobs: {
                    label: "Mobs",
                    color: 0xff66dd,
                    defaults: { type: "motobug", x: 0, z: 0, patrolRadius: 5 },
                    fields: [
                        { key: "type", type: "text" },
                        { key: "x", min: -120, max: 120, step: 0.5 },
                        { key: "z", min: -120, max: 120, step: 0.5 },
                        { key: "patrolRadius", min: 0, max: 20, step: 0.5 },
                    ],
                },
                trees: {
                    label: "Trees",
                    color: 0x43a047,
                    defaults: { x: 0, z: 0, scale: 1.0 },
                    fields: [
                        { key: "x", min: -130, max: 130, step: 0.5 },
                        { key: "z", min: -130, max: 130, step: 0.5 },
                        { key: "scale", min: 0.3, max: 3.0, step: 0.05 },
                    ],
                },
                flowers: {
                    label: "Flowers",
                    color: 0xff4081,
                    defaults: { x: 0, z: 0 },
                    fields: [
                        { key: "x", min: -130, max: 130, step: 0.5 },
                        { key: "z", min: -130, max: 130, step: 0.5 },
                    ],
                },
                rings: {
                    label: "Rings",
                    color: 0xffd54f,
                    defaults: { x: 0, z: 0 },
                    fields: [
                        { key: "x", min: -130, max: 130, step: 0.5 },
                        { key: "z", min: -130, max: 130, step: 0.5 },
                    ],
                },
                walls: {
                    label: "Walls",
                    color: 0xb5835a,
                    defaults: { x: 0, z: 0, width: 10, height: 4, rotY: 0, tileSize: 1.1 },
                    fields: [
                        { key: "x", min: -130, max: 130, step: 0.5 },
                        { key: "z", min: -130, max: 130, step: 0.5 },
                        { key: "width", min: 1, max: 60, step: 0.5 },
                        { key: "height", min: 1, max: 20, step: 1 },
                        { key: "rotY", min: -180, max: 180, step: 5 },
                        { key: "tileSize", min: 0.5, max: 3.0, step: 0.05 },
                    ],
                },
            };

            const FALLBACK_CONFIG = {
                worldRadius: 110,
                hubRadius: 9,
                plateaus: [],
                ramps: [],
                lakes: [],
                trenches: [],
                waterPlanes: [],
                bridges: [],
                mobs: [],
                trees: [],
                flowers: [],
                rings: [],
                walls: [],
            };

            // ─── State ────────────────────────────────────────────────────────────────────
            let MAP_CONFIG = structuredClone(FALLBACK_CONFIG);
            let sourceText = ""; // raw map_design.js source to preserve when exporting
            let selected = null; // { type, index }
            const collapsed = new Set(); // group ids that are collapsed

            // groundY — mirrors map_design.js priority: world R > plateaus > lakes/trenches
            function groundY(x, z) {
                let y = 0;
                const distOrigin = Math.sqrt(x * x + z * z);

                if (distOrigin < MAP_CONFIG.hubRadius) {
                    y = Math.max(y, 0);
                }

                let plateauY = 0;
                for (const p of MAP_CONFIG.plateaus) {
                    const dist = Math.sqrt((x - p.x) ** 2 + (z - p.z) ** 2);
                    const transition = Math.max(0, Math.min(1, (p.radius - dist) / 2.0 + 0.5));
                    if (transition > 0) {
                        const smooth = transition * transition * (3 - 2 * transition);
                        plateauY = Math.max(plateauY, smooth * p.height);
                    }
                }
                y = Math.max(y, plateauY);

                for (const r of MAP_CONFIG.ramps) {
                    const hw = r.width / 2.0;
                    const hl = r.length / 2.0;
                    if (x > r.x - hw && x < r.x + hw && z > r.z - hl && z < r.z + hl) {
                        let t = 0;
                        if (r.facing === "north") t = (r.z + hl - z) / r.length;
                        else if (r.facing === "south") t = (z - (r.z - hl)) / r.length;
                        else if (r.facing === "east") t = (x - (r.x - hw)) / r.width;
                        else if (r.facing === "west") t = (r.x + hw - x) / r.width;
                        if (t > 0) y = Math.max(y, t * t * r.height);
                    }
                }

                if (plateauY === 0) {
                    for (const lake of MAP_CONFIG.lakes) {
                        const dist = Math.sqrt((x - lake.x) ** 2 + (z - lake.z) ** 2);
                        if (dist < lake.radius) {
                            y -= Math.cos(((dist / lake.radius) * Math.PI) / 2) * lake.depth;
                        }
                    }

                    for (const t of MAP_CONFIG.trenches) {
                        const hw = t.width / 2.0;
                        const hl = t.length / 2.0;
                        if (x > t.x - hw && x < t.x + hw && z > t.z - hl && z < t.z + hl) {
                            y = Math.min(y, -t.depth);
                        }
                    }
                }

                // world radius wall wins over everything
                if (distOrigin > MAP_CONFIG.worldRadius) {
                    const t = Math.max(
                        0,
                        Math.min(1, (distOrigin - MAP_CONFIG.worldRadius) / 10.0)
                    );
                    if (t > 0) y = Math.max(y, t * t * (3 - 2 * t) * 40.0);
                }

                return y;
            }

            // ─── Scene setup ──────────────────────────────────────────────────────────────
            const vpEl = document.getElementById("viewport");
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d0d14);
            scene.fog = new THREE.Fog(0x0d0d14, 180, 400);

            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.set(0, 180, 0.01); // start top-down
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            vpEl.appendChild(renderer.domElement);

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dir = new THREE.DirectionalLight(0xffffff, 1.0);
            dir.position.set(60, 120, 60);
            scene.add(dir);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 20;
            controls.maxDistance = 400;
            // Left = drag objects (handled by us), Right = rotate, Middle = pan
            controls.mouseButtons = {
                LEFT: null,
                MIDDLE: THREE.MOUSE.PAN,
                RIGHT: THREE.MOUSE.ROTATE,
            };

            // Axis / grid helpers
            const grid = new THREE.GridHelper(300, 30, 0x2a2a3e, 0x1a1a28);
            grid.position.y = -0.01;
            scene.add(grid);

            // ─── Terrain mesh (rebuilt on MAP_CONFIG change) ──────────────────────────────
            const TERRAIN_SIZE = 300;
            const TERRAIN_SEG = 150; // editor uses half-res for speed
            const terrainGeo = new THREE.PlaneGeometry(
                TERRAIN_SIZE,
                TERRAIN_SIZE,
                TERRAIN_SEG,
                TERRAIN_SEG
            );
            terrainGeo.rotateX(-Math.PI / 2);
            const terrainCols = new Float32Array(terrainGeo.attributes.position.count * 3);
            terrainGeo.setAttribute("color", new THREE.BufferAttribute(terrainCols, 3));
            const terrainMat = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.85,
                metalness: 0.0,
            });
            const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
            scene.add(terrainMesh);

            function rebuildTerrain() {
                const pos = terrainGeo.attributes.position;
                const cols = terrainGeo.attributes.color.array;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const z = pos.getZ(i);
                    const y = groundY(x, z);
                    pos.setY(i, y);

                    const cx = Math.floor(x / 4);
                    const cz = Math.floor(z / 4);
                    const even = (cx + cz) % 2 === 0;
                    const dx = groundY(x + 0.5, z) - y;
                    const dz = groundY(x, z + 0.5) - y;
                    const slope = Math.sqrt(dx * dx + dz * dz) / 0.5;
                    const t = Math.max(0, Math.min(1, y / 20));
                    if (slope > 0.8) {
                        cols[i * 3] = 0.55 + t * 0.1;
                        cols[i * 3 + 1] = 0.35 + t * 0.1;
                        cols[i * 3 + 2] = 0.15 + t * 0.1;
                    } else if (even) {
                        cols[i * 3] = 0.2;
                        cols[i * 3 + 1] = 0.65 + t * 0.1;
                        cols[i * 3 + 2] = 0.15;
                    } else {
                        cols[i * 3] = 0.15;
                        cols[i * 3 + 1] = 0.55 + t * 0.1;
                        cols[i * 3 + 2] = 0.1;
                    }
                }
                pos.needsUpdate = true;
                terrainGeo.attributes.color.needsUpdate = true;
                terrainGeo.computeVertexNormals();
            }

            // ─── Overlays: one Group per object, flat on terrain ─────────────────────────
            const overlayRoot = new THREE.Group();
            scene.add(overlayRoot);
            const pickables = []; // { mesh, type, index }

            function disposeGroup(g) {
                g.traverse((n) => {
                    if (n.geometry) n.geometry.dispose();
                    if (n.material) {
                        if (Array.isArray(n.material)) n.material.forEach((m) => m.dispose());
                        else n.material.dispose();
                    }
                });
            }

            function clearOverlays() {
                while (overlayRoot.children.length) {
                    const c = overlayRoot.children[0];
                    overlayRoot.remove(c);
                    disposeGroup(c);
                }
                pickables.length = 0;
            }

            function makeDiscOverlay(color, radius, y, opacity = 0.35) {
                const geo = new THREE.CircleGeometry(radius, 48);
                geo.rotateX(-Math.PI / 2);
                const mat = new THREE.MeshBasicMaterial({
                    color,
                    transparent: true,
                    opacity,
                    depthWrite: false,
                });
                const m = new THREE.Mesh(geo, mat);
                m.position.y = y + 0.05;
                return m;
            }

            function makeRingOverlay(color, radius, y, thickness = 0.4) {
                const geo = new THREE.RingGeometry(Math.max(0.01, radius - thickness), radius, 64);
                geo.rotateX(-Math.PI / 2);
                const mat = new THREE.MeshBasicMaterial({
                    color,
                    transparent: true,
                    opacity: 0.95,
                    depthWrite: false,
                });
                const m = new THREE.Mesh(geo, mat);
                m.position.y = y + 0.08;
                return m;
            }

            function makeRectOverlay(color, w, l, y, opacity = 0.35) {
                const geo = new THREE.PlaneGeometry(w, l);
                geo.rotateX(-Math.PI / 2);
                const mat = new THREE.MeshBasicMaterial({
                    color,
                    transparent: true,
                    opacity,
                    depthWrite: false,
                });
                const m = new THREE.Mesh(geo, mat);
                m.position.y = y + 0.05;
                return m;
            }

            function makeRectOutline(color, w, l, y) {
                const pts = [
                    new THREE.Vector3(-w / 2, 0, -l / 2),
                    new THREE.Vector3(w / 2, 0, -l / 2),
                    new THREE.Vector3(w / 2, 0, l / 2),
                    new THREE.Vector3(-w / 2, 0, l / 2),
                    new THREE.Vector3(-w / 2, 0, -l / 2),
                ];
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                const mat = new THREE.LineBasicMaterial({ color });
                const line = new THREE.Line(geo, mat);
                line.position.y = y + 0.09;
                return line;
            }

            function makeArrow(color, len, y) {
                // Points toward -Z by default (north) so we can rotate it per facing
                const shaft = new THREE.Mesh(
                    new THREE.BoxGeometry(0.4, 0.1, len),
                    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
                );
                shaft.position.z = -len / 2;
                const head = new THREE.Mesh(
                    new THREE.ConeGeometry(0.9, 1.6, 8),
                    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
                );
                head.rotation.x = -Math.PI / 2;
                head.position.z = -len - 0.4;
                const g = new THREE.Group();
                g.add(shaft);
                g.add(head);
                g.position.y = y + 0.2;
                return g;
            }

            function buildOverlayForObject(type, obj, idx) {
                const spec = TYPES[type];
                const group = new THREE.Group();
                group.userData = { type, index: idx };

                if (type === "plateaus") {
                    const y = obj.height;
                    const disc = makeDiscOverlay(spec.color, obj.radius, y, 0.22);
                    disc.userData.pickable = true;
                    group.add(disc);
                    group.add(makeRingOverlay(spec.color, obj.radius, y));
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "ramps") {
                    const y = 0.1;
                    const rect = makeRectOverlay(spec.color, obj.width, obj.length, y, 0.22);
                    rect.userData.pickable = true;
                    group.add(rect);
                    group.add(makeRectOutline(spec.color, obj.width, obj.length, y));
                    // Arrow showing the uphill direction — ramp starts at 0 and rises in that direction
                    const arrow = makeArrow(spec.color, Math.min(obj.length, obj.width) * 0.6, y);
                    const rotMap = {
                        north: 0,
                        south: Math.PI,
                        east: -Math.PI / 2,
                        west: Math.PI / 2,
                    };
                    arrow.rotation.y = rotMap[obj.facing] || 0;
                    group.add(arrow);
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "lakes") {
                    const y = -obj.depth;
                    const disc = makeDiscOverlay(spec.color, obj.radius, y, 0.2);
                    disc.userData.pickable = true;
                    group.add(disc);
                    group.add(makeRingOverlay(spec.color, obj.radius, 0.02));
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "trenches") {
                    const y = -obj.depth;
                    const rect = makeRectOverlay(spec.color, obj.width, obj.length, y, 0.22);
                    rect.userData.pickable = true;
                    group.add(rect);
                    group.add(makeRectOutline(spec.color, obj.width, obj.length, 0.02));
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "waterPlanes") {
                    const rect = makeRectOverlay(spec.color, obj.width, obj.length, obj.y, 0.45);
                    rect.userData.pickable = true;
                    group.add(rect);
                    group.add(makeRectOutline(spec.color, obj.width, obj.length, obj.y));
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "bridges") {
                    const isX = obj.spanAxis === "x";
                    const w = isX ? obj.length : obj.width;
                    const l = isX ? obj.width : obj.length;
                    const rect = makeRectOverlay(spec.color, w, l, obj.y + 0.5, 0.55);
                    rect.userData.pickable = true;
                    group.add(rect);
                    group.add(makeRectOutline(spec.color, w, l, obj.y + 0.5));
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "mobs") {
                    const y = groundY(obj.x, obj.z) + 1;
                    const sph = new THREE.Mesh(
                        new THREE.SphereGeometry(1.2, 16, 12),
                        new THREE.MeshBasicMaterial({
                            color: spec.color,
                            transparent: true,
                            opacity: 0.85,
                        })
                    );
                    sph.position.y = y;
                    sph.userData.pickable = true;
                    group.add(sph);
                    if (obj.patrolRadius > 0) {
                        group.add(makeRingOverlay(spec.color, obj.patrolRadius, 0.02, 0.2));
                    }
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "trees") {
                    const sc = obj.scale ?? 1.0;
                    const y = groundY(obj.x, obj.z);
                    const disc = makeDiscOverlay(spec.color, 1.5 * sc, y, 0.28);
                    disc.userData.pickable = true;
                    group.add(disc);
                    group.add(makeRingOverlay(spec.color, 1.5 * sc, y));
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "flowers") {
                    const y = groundY(obj.x, obj.z);
                    const disc = makeDiscOverlay(spec.color, 0.7, y, 0.75);
                    disc.userData.pickable = true;
                    group.add(disc);
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "rings") {
                    const y = groundY(obj.x, obj.z) + 1.0;
                    const disc = makeDiscOverlay(spec.color, 0.5, y, 0.8);
                    disc.userData.pickable = true;
                    group.add(disc);
                    group.position.set(obj.x, 0, obj.z);
                } else if (type === "walls") {
                    const ts = obj.tileSize ?? 1.0;
                    const depth = ts * 0.6;
                    const y = groundY(obj.x, obj.z);
                    const rect = makeRectOverlay(spec.color, obj.width, depth, y, 0.7);
                    rect.userData.pickable = true;
                    group.add(rect);
                    group.add(makeRectOutline(spec.color, obj.width, depth, y));
                    group.rotation.y = obj.rotY * (Math.PI / 180);
                    group.position.set(obj.x, 0, obj.z);
                }

                group.children.forEach((c) => {
                    if (c.userData.pickable) {
                        pickables.push({ mesh: c, type, index: idx });
                    }
                });

                return group;
            }

            function rebuildOverlays() {
                clearOverlays();
                // World radius ring
                const worldRing = new THREE.Mesh(
                    new THREE.RingGeometry(
                        MAP_CONFIG.worldRadius - 0.3,
                        MAP_CONFIG.worldRadius,
                        96
                    ),
                    new THREE.MeshBasicMaterial({
                        color: 0xffffff,
                        transparent: true,
                        opacity: 0.3,
                    })
                );
                worldRing.rotation.x = -Math.PI / 2;
                worldRing.position.y = 0.2;
                overlayRoot.add(worldRing);

                for (const type of Object.keys(TYPES)) {
                    const list = MAP_CONFIG[type] || [];
                    for (let i = 0; i < list.length; i++) {
                        overlayRoot.add(buildOverlayForObject(type, list[i], i));
                    }
                }
                updateSelectionHighlight();
            }

            // ─── Selection & dragging ─────────────────────────────────────────────────────
            const raycaster = new THREE.Raycaster();
            const pointer = new THREE.Vector2();
            const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const hitPoint = new THREE.Vector3();
            let dragging = null; // { type, index, startPt, startObj }

            function setPointerFromEvent(e) {
                const rect = renderer.domElement.getBoundingClientRect();
                pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            }

            function pickAt(e) {
                setPointerFromEvent(e);
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(
                    pickables.map((p) => p.mesh),
                    false
                );
                if (!hits.length) return null;
                const mesh = hits[0].object;
                const rec = pickables.find((p) => p.mesh === mesh);
                return rec || null;
            }

            function groundPick(e) {
                setPointerFromEvent(e);
                raycaster.setFromCamera(pointer, camera);
                if (!raycaster.ray.intersectPlane(groundPlane, hitPoint)) return null;
                return hitPoint.clone();
            }

            renderer.domElement.addEventListener("pointerdown", (e) => {
                if (e.button !== 0) return;
                const hit = pickAt(e);
                if (hit) {
                    selected = { type: hit.type, index: hit.index };
                    const obj = MAP_CONFIG[hit.type][hit.index];
                    const pt = groundPick(e);
                    dragging = pt
                        ? {
                              type: hit.type,
                              index: hit.index,
                              startPt: pt,
                              startObj: { x: obj.x, z: obj.z },
                          }
                        : null;
                    renderer.domElement.setPointerCapture(e.pointerId);
                    refreshPanel();
                    updateSelectionHighlight();
                    e.preventDefault();
                }
            });

            renderer.domElement.addEventListener("pointermove", (e) => {
                if (!dragging) return;
                const pt = groundPick(e);
                if (!pt) return;
                const dx = pt.x - dragging.startPt.x;
                const dz = pt.z - dragging.startPt.z;
                const obj = MAP_CONFIG[dragging.type][dragging.index];
                obj.x = +(dragging.startObj.x + dx).toFixed(2);
                obj.z = +(dragging.startObj.z + dz).toFixed(2);
                rebuildOverlays();
                // Lightweight terrain update
                scheduleRebuildTerrain();
                refreshInspectorValues();
            });

            renderer.domElement.addEventListener("pointerup", (e) => {
                if (dragging) {
                    renderer.domElement.releasePointerCapture?.(e.pointerId);
                    dragging = null;
                }
            });

            // Click empty space to deselect
            renderer.domElement.addEventListener("click", (e) => {
                if (e.button !== 0) return;
                if (dragging) return;
                const hit = pickAt(e);
                if (!hit && selected) {
                    selected = null;
                    refreshPanel();
                    updateSelectionHighlight();
                }
            });

            // Keyboard: delete selected
            window.addEventListener("keydown", (e) => {
                if (e.key === "Delete" || e.key === "Backspace") {
                    if (selected && document.activeElement?.tagName !== "INPUT") {
                        deleteObject(selected.type, selected.index);
                        e.preventDefault();
                    }
                }
            });

            function updateSelectionHighlight() {
                // Bump opacity of the selected overlay's first mesh
                overlayRoot.children.forEach((g) => {
                    if (!g.userData?.type) return;
                    const sel =
                        selected &&
                        g.userData.type === selected.type &&
                        g.userData.index === selected.index;
                    g.children.forEach((c) => {
                        if (c.material && c.material.opacity !== undefined) {
                            const baseOp = c.userData.pickable ? (sel ? 0.55 : 0.3) : undefined;
                            if (baseOp !== undefined) c.material.opacity = baseOp;
                        }
                    });
                });
            }

            // ─── Terrain rebuild throttling ───────────────────────────────────────────────
            let terrainRebuildScheduled = false;
            function scheduleRebuildTerrain() {
                if (terrainRebuildScheduled) return;
                terrainRebuildScheduled = true;
                requestAnimationFrame(() => {
                    terrainRebuildScheduled = false;
                    rebuildTerrain();
                });
            }

            // ─── Panel rendering ──────────────────────────────────────────────────────────
            const groupsEl = document.getElementById("groups");

            function refreshPanel() {
                renderGroups();
                renderInspector();
                renderGlobals();
                updateTotalCount();
                updateInfo();
            }

            function updateTotalCount() {
                let n = 0;
                for (const t of Object.keys(TYPES)) n += (MAP_CONFIG[t] || []).length;
                document.getElementById("total-count").textContent = n + " items";
            }

            function updateInfo() {
                const info = document.getElementById("info-title");
                const hint = document.getElementById("info-hint");
                if (!selected) {
                    info.textContent = "Nothing selected";
                    hint.textContent = "Click an object in the scene or list";
                    return;
                }
                const spec = TYPES[selected.type];
                const obj = MAP_CONFIG[selected.type][selected.index];
                info.textContent = `${spec.label.replace(/s$/, "")} #${selected.index}`;
                hint.textContent = `x=${obj.x}  z=${obj.z}`;
            }

            function renderGroups() {
                groupsEl.innerHTML = "";
                for (const [type, spec] of Object.entries(TYPES)) {
                    const list = MAP_CONFIG[type] || [];
                    const g = document.createElement("div");
                    g.className = "group" + (collapsed.has(type) ? " collapsed" : "");

                    const header = document.createElement("div");
                    header.className = "group-header";
                    header.innerHTML = `
                        <div class="gh-left">
                            <div class="gh-dot" style="background: #${spec.color.toString(16).padStart(6, "0")}"></div>
                            <span>${spec.label}</span>
                            <span class="gh-count">${list.length}</span>
                        </div>
                        <button class="gh-add" title="Add ${spec.label}">+</button>
                    `;
                    header.addEventListener("click", (e) => {
                        if (e.target.classList.contains("gh-add")) return;
                        if (collapsed.has(type)) collapsed.delete(type);
                        else collapsed.add(type);
                        renderGroups();
                    });
                    header.querySelector(".gh-add").addEventListener("click", (e) => {
                        e.stopPropagation();
                        addObject(type);
                    });
                    g.appendChild(header);

                    const items = document.createElement("div");
                    items.className = "group-items";
                    list.forEach((obj, i) => {
                        const it = document.createElement("div");
                        it.className =
                            "obj-item" +
                            (selected && selected.type === type && selected.index === i
                                ? " selected"
                                : "");
                        const label = `#${i}`;
                        const sub =
                            type === "mobs"
                                ? `${obj.type} @ ${obj.x},${obj.z}`
                                : `@ ${obj.x}, ${obj.z}`;
                        it.innerHTML = `
                            <span>${label}</span>
                            <span class="obj-name">${sub}</span>
                            <button class="obj-del" title="Delete">×</button>
                        `;
                        it.addEventListener("click", (e) => {
                            if (e.target.classList.contains("obj-del")) return;
                            selected = { type, index: i };
                            refreshPanel();
                            updateSelectionHighlight();
                        });
                        it.querySelector(".obj-del").addEventListener("click", (e) => {
                            e.stopPropagation();
                            deleteObject(type, i);
                        });
                        items.appendChild(it);
                    });
                    g.appendChild(items);
                    groupsEl.appendChild(g);
                }
            }

            function renderGlobals() {
                const r = document.getElementById("g-worldR");
                const n = document.getElementById("g-worldR-num");
                r.value = MAP_CONFIG.worldRadius;
                n.value = MAP_CONFIG.worldRadius;
            }

            for (const [id, key] of [["g-worldR", "worldRadius"]]) {
                const r = document.getElementById(id);
                const n = document.getElementById(id + "-num");
                const onInput = (src, other) => () => {
                    MAP_CONFIG[key] = +src.value;
                    other.value = src.value;
                    scheduleRebuildTerrain();
                    rebuildOverlays();
                };
                r.addEventListener("input", onInput(r, n));
                n.addEventListener("input", onInput(n, r));
            }

            // ─── Inspector ────────────────────────────────────────────────────────────────
            const inspectorEl = document.getElementById("inspector");

            function renderInspector() {
                inspectorEl.classList.remove("empty");
                if (!selected) {
                    inspectorEl.className = "empty";
                    inspectorEl.textContent = "Select an object to edit";
                    return;
                }
                const { type, index } = selected;
                const spec = TYPES[type];
                const obj = MAP_CONFIG[type][index];
                const frag = document.createElement("div");

                const title = document.createElement("div");
                title.className = "ins-title";
                title.textContent = `${spec.label.replace(/s$/, "")} #${index}`;
                frag.appendChild(title);

                for (const f of spec.fields) {
                    const row = document.createElement("div");
                    row.className = "field";
                    const lbl = document.createElement("label");
                    lbl.textContent = f.key;
                    row.appendChild(lbl);

                    if (f.type === "select") {
                        const sel = document.createElement("select");
                        for (const opt of f.options) {
                            const o = document.createElement("option");
                            o.value = opt;
                            o.textContent = opt;
                            sel.appendChild(o);
                        }
                        sel.value = obj[f.key];
                        sel.addEventListener("change", () => {
                            obj[f.key] = sel.value;
                            scheduleRebuildTerrain();
                            rebuildOverlays();
                        });
                        row.appendChild(sel);
                    } else if (f.type === "text") {
                        const txt = document.createElement("input");
                        txt.type = "text";
                        txt.value = obj[f.key];
                        txt.addEventListener("input", () => {
                            obj[f.key] = txt.value;
                        });
                        row.appendChild(txt);
                    } else {
                        // number — range + number input
                        const rng = document.createElement("input");
                        rng.type = "range";
                        rng.className = "val-range";
                        rng.min = f.min;
                        rng.max = f.max;
                        rng.step = f.step;
                        rng.value = obj[f.key];
                        const num = document.createElement("input");
                        num.type = "number";
                        num.className = "val-num";
                        num.step = f.step;
                        num.value = obj[f.key];
                        const apply = (src, other) => () => {
                            const v = +src.value;
                            obj[f.key] = +v.toFixed(2);
                            other.value = src.value;
                            scheduleRebuildTerrain();
                            rebuildOverlays();
                            updateInfo();
                        };
                        rng.addEventListener("input", apply(rng, num));
                        num.addEventListener("input", apply(num, rng));
                        row.appendChild(rng);
                        row.appendChild(num);
                    }
                    frag.appendChild(row);
                }

                // Duplicate / delete
                const actionRow = document.createElement("div");
                actionRow.className = "btn-row";
                actionRow.style.marginTop = "8px";
                const dupBtn = document.createElement("button");
                dupBtn.className = "btn";
                dupBtn.textContent = "Duplicate";
                dupBtn.addEventListener("click", () => duplicateObject(type, index));
                const delBtn = document.createElement("button");
                delBtn.className = "btn danger";
                delBtn.textContent = "Delete";
                delBtn.addEventListener("click", () => deleteObject(type, index));
                actionRow.appendChild(dupBtn);
                actionRow.appendChild(delBtn);
                frag.appendChild(actionRow);

                inspectorEl.innerHTML = "";
                inspectorEl.appendChild(frag);
            }

            function refreshInspectorValues() {
                // Called during drag — just update numeric inputs, don't re-render layout
                if (!selected) return;
                const obj = MAP_CONFIG[selected.type][selected.index];
                const inputs = inspectorEl.querySelectorAll(".field");
                inputs.forEach((row) => {
                    const key = row.querySelector("label")?.textContent;
                    if (!key || obj[key] === undefined) return;
                    const inputs = row.querySelectorAll("input");
                    inputs.forEach((inp) => (inp.value = obj[key]));
                });
                updateInfo();
            }

            // ─── Object CRUD ──────────────────────────────────────────────────────────────
            function addObject(type) {
                const spec = TYPES[type];
                const fresh = structuredClone(spec.defaults);
                // Drop near current camera target if visible
                if (fresh.x !== undefined) fresh.x = +controls.target.x.toFixed(1);
                if (fresh.z !== undefined) fresh.z = +controls.target.z.toFixed(1);
                MAP_CONFIG[type].push(fresh);
                selected = { type, index: MAP_CONFIG[type].length - 1 };
                if (collapsed.has(type)) collapsed.delete(type);
                rebuildOverlays();
                scheduleRebuildTerrain();
                refreshPanel();
            }

            function duplicateObject(type, idx) {
                const src = MAP_CONFIG[type][idx];
                const copy = structuredClone(src);
                if (copy.x !== undefined) copy.x += 5;
                if (copy.z !== undefined) copy.z += 5;
                MAP_CONFIG[type].splice(idx + 1, 0, copy);
                selected = { type, index: idx + 1 };
                rebuildOverlays();
                scheduleRebuildTerrain();
                refreshPanel();
            }

            function deleteObject(type, idx) {
                MAP_CONFIG[type].splice(idx, 1);
                if (
                    selected &&
                    selected.type === type &&
                    (selected.index === idx || selected.index >= MAP_CONFIG[type].length)
                ) {
                    selected = null;
                }
                rebuildOverlays();
                scheduleRebuildTerrain();
                refreshPanel();
            }

            // ─── Import / Export ──────────────────────────────────────────────────────────
            const fileInput = document.getElementById("file-input");
            const fileDrop = document.getElementById("file-drop");
            fileDrop.addEventListener("click", () => fileInput.click());
            fileDrop.addEventListener("dragover", (e) => {
                e.preventDefault();
                fileDrop.classList.add("drag-over");
            });
            fileDrop.addEventListener("dragleave", () => fileDrop.classList.remove("drag-over"));
            fileDrop.addEventListener("drop", (e) => {
                e.preventDefault();
                fileDrop.classList.remove("drag-over");
                const f = e.dataTransfer.files[0];
                if (f) readFile(f);
            });
            fileInput.addEventListener("change", (e) => {
                if (e.target.files[0]) readFile(e.target.files[0]);
            });

            function readFile(f) {
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const text = reader.result;
                        if (f.name.endsWith(".json")) {
                            const cfg = JSON.parse(text);
                            applyConfig(cfg);
                            toast(`Loaded JSON · ${f.name}`);
                        } else {
                            const cfg = extractConfig(text);
                            sourceText = text;
                            applyConfig(cfg);
                            toast(`Loaded · ${f.name}`);
                        }
                        document.getElementById("drop-label").innerHTML =
                            `Loaded: <b>${f.name}</b><br /><span style='opacity:0.6'>click to load another</span>`;
                    } catch (err) {
                        console.error(err);
                        toast("Parse failed: " + err.message, true);
                    }
                };
                reader.readAsText(f);
            }

            function extractConfig(text) {
                const m = text.match(/export\s+const\s+MAP_CONFIG\s*=\s*(\{[\s\S]*?\n\});/);
                if (!m) throw new Error("MAP_CONFIG not found");
                // eslint-disable-next-line no-new-func
                return new Function(`"use strict"; return (${m[1]});`)();
            }

            function applyConfig(cfg) {
                // Merge so we always have every expected array, even if missing
                MAP_CONFIG = { ...structuredClone(FALLBACK_CONFIG), ...structuredClone(cfg) };
                for (const t of Object.keys(TYPES)) {
                    if (!Array.isArray(MAP_CONFIG[t])) MAP_CONFIG[t] = [];
                }
                selected = null;
                rebuildTerrain();
                rebuildOverlays();
                refreshPanel();
            }

            function stringifyConfig(cfg) {
                // Custom pretty-printer that keeps each object on one line — matches existing style
                const indent = "    ";
                const lines = [];
                lines.push("{");
                lines.push(`${indent}worldRadius: ${cfg.worldRadius},`);
                lines.push(`${indent}hubRadius: ${cfg.hubRadius},`);
                lines.push("");
                for (const key of [
                    "plateaus",
                    "ramps",
                    "lakes",
                    "trenches",
                    "waterPlanes",
                    "bridges",
                    "mobs",
                    "trees",
                    "flowers",
                    "rings",
                    "walls",
                ]) {
                    const arr = cfg[key] || [];
                    if (arr.length === 0) {
                        lines.push(`${indent}${key}: [],`);
                    } else {
                        lines.push(`${indent}${key}: [`);
                        for (const o of arr) {
                            lines.push(`${indent}${indent}${formatObject(o)},`);
                        }
                        lines.push(`${indent}],`);
                    }
                    lines.push("");
                }
                // Trim trailing blank
                while (lines[lines.length - 1] === "") lines.pop();
                lines.push("}");
                return lines.join("\n");
            }

            function formatObject(o) {
                const pairs = [];
                for (const [k, v] of Object.entries(o)) {
                    if (typeof v === "string") pairs.push(`${k}: "${v}"`);
                    else pairs.push(`${k}: ${v}`);
                }
                return `{ ${pairs.join(", ")} }`;
            }

            function buildJsFile() {
                const cfgStr = stringifyConfig(MAP_CONFIG);
                if (sourceText) {
                    // Replace MAP_CONFIG block in the original source
                    const replaced = sourceText.replace(
                        /export\s+const\s+MAP_CONFIG\s*=\s*\{[\s\S]*?\n\};/,
                        `export const MAP_CONFIG = ${cfgStr};`
                    );
                    if (replaced !== sourceText) return replaced;
                }
                // No source loaded — emit just the config declaration
                return `export const MAP_CONFIG = ${cfgStr};\n`;
            }

            function download(filename, text) {
                const blob = new Blob([text], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = filename;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            }

            document.getElementById("download-js-btn").addEventListener("click", () => {
                download("map_design.js", buildJsFile());
                toast("Saved map_design.js");
            });
            document.getElementById("download-json-btn").addEventListener("click", () => {
                download("map_config.json", JSON.stringify(MAP_CONFIG, null, 2));
                toast("Saved map_config.json");
            });
            document.getElementById("copy-btn").addEventListener("click", async () => {
                try {
                    await navigator.clipboard.writeText(
                        `export const MAP_CONFIG = ${stringifyConfig(MAP_CONFIG)};`
                    );
                    toast("Copied to clipboard");
                } catch {
                    toast("Copy failed", true);
                }
            });
            document.getElementById("reload-btn").addEventListener("click", async () => {
                await loadFromProject();
                toast("Reloaded from disk");
            });

            // ─── Toast ────────────────────────────────────────────────────────────────────
            const toastEl = document.getElementById("toast");
            let toastT;
            function toast(msg, isErr = false) {
                toastEl.textContent = msg;
                toastEl.className = "toast show" + (isErr ? " err" : "");
                clearTimeout(toastT);
                toastT = setTimeout(() => toastEl.classList.remove("show"), 1800);
            }

            // ─── Camera modes ─────────────────────────────────────────────────────────────
            document.getElementById("mode-top").addEventListener("click", () => {
                camera.position.set(0, 200, 0.01);
                controls.target.set(0, 0, 0);
                controls.update();
                document.getElementById("mode-top").classList.add("active");
                document.getElementById("mode-persp").classList.remove("active");
            });
            document.getElementById("mode-persp").addEventListener("click", () => {
                camera.position.set(80, 100, 120);
                controls.target.set(0, 0, 0);
                controls.update();
                document.getElementById("mode-persp").classList.add("active");
                document.getElementById("mode-top").classList.remove("active");
            });

            // ─── Initial load: fetch project map_design.js ───────────────────────────────
            async function loadFromProject() {
                try {
                    const resp = await fetch("./js/world/map_design.js", { cache: "no-store" });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const text = await resp.text();
                    sourceText = text;
                    const cfg = extractConfig(text);
                    applyConfig(cfg);
                    document.getElementById("drop-label").innerHTML =
                        `Loaded: <b>js/world/map_design.js</b><br /><span style='opacity:0.6'>drop a file to replace</span>`;
                } catch (e) {
                    console.warn("Could not auto-load map_design.js:", e);
                    applyConfig(FALLBACK_CONFIG);
                    toast("No file auto-loaded — drop one in", true);
                }
            }

            // ─── Render loop & resize ─────────────────────────────────────────────────────
            function resize() {
                const w = vpEl.clientWidth;
                const h = vpEl.clientHeight;
                renderer.setSize(w, h, false);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            }
            window.addEventListener("resize", resize);
            resize();

            function tick() {
                controls.update();
                renderer.render(scene, camera);
                requestAnimationFrame(tick);
            }

            // Boot
            loadFromProject().then(() => {
                tick();
            });
        </script>
    </body>
</html>
